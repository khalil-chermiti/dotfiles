[env]
TERM = "xterm-256color"

[window]
decorations = "full"
startup_mode = "Maximized"
padding = { x = 1, y = 1 }
dynamic_padding = true
opacity = 1.0

[font]
size = 14.0

[font.normal]
family = "JetBrainsMono Nerd Font"

[font.bold]
style = "Bold"

[font.italic]
style = "Italic"

[font.bold_italic]
style = "Bold Italic"

[font.offset]
y = 3 

# Kanagawa Lotus (Light) Theme Colors
[colors.primary]
background = "#f2ecbc" # Lotus White (Warm paper)
foreground = "#545464" # Lotus Ink

[colors.cursor]
text   = "#f2ecbc"
cursor = "#545464"

[colors.normal]
black   = "#1f1f28" # Sumi Ink
red     = "#c8405a" # Light Autumn Red
green   = "#6f894a" # Autumn Green
yellow  = "#77713f" # Boatmen Yellow
blue    = "#4d699b" # Crystal Blue
magenta = "#b35b79" # Oni Violet
cyan    = "#597b75" # Wave Aqua
white   = "#d5cea3" # Old White

[colors.bright]
black   = "#a6a69c" # Village Gray
red     = "#e82424" # Samurai Red
green   = "#98bb6c" # Autumn Green (Bright)
yellow  = "#e6c384" # Carp Yellow
blue    = "#7fb4ca" # Sky Blue
magenta = "#938aa9" # Spring Violet
cyan    = "#7aa89f" # Wave Blue
white   = "#545464" # Lotus Ink (Contrast)
