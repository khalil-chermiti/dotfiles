# ******************** terminal settings *******************
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set-option -g focus-events on
set-option -sg escape-time 300
set -g mouse on

# ******************** plugins *******************
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'off'
set -g @resurrect-capture-pane-contents 'off'
set -g @resurrect-strategy-nvim 'session'

# ******************** status bar (Kanagawa Dark) *******************
set -g status on
set -g status-position bottom
set -g status-justify right 

# Status Background: #16161d | Foreground: #c8c093
set -g status-style bg=#16161d,fg=#c8c093

set -g status-left-length 50
set -g status-right-length 10

# Session: Using the foreground color for consistency
set -g status-left "#[fg=#c8c093] session: #S "

# Window list format: Inactive windows in #c8c093
set -g window-status-separator "  " 
set -g window-status-format "#[fg=#c8c093]#I:#W"

# Current window: High contrast highlight (using a bright Gold/Orange or keep Red)
# I've used a brighter Autumn Orange (#ff9e3b) here to pop against the dark background, 
# but you can change it to #c84043 if you prefer the Lotus Red.
set -g window-status-current-format "#[fg=#c34043]*#I:#W"

set -g status-right " "

# Pane borders: Subtle dark borders with foreground highlight
set -g pane-border-style fg=#2a2a37
set -g pane-active-border-style fg=#c8c093

# ******************** remapping ********************
unbind C-b
set-option -g prefix C-Space
bind C-Space send-prefix

unbind %
unbind '"'

bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Resizing
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Copy Mode (VI)
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind P paste-buffer
unbind -T copy-mode-vi MouseDragEnd1Pane

set -g base-index 1
setw -g pane-base-index 1

unbind r
bind r source-file ~/.config/tmux/tmux.conf

# ******************** initialize TPM ********************
run '~/.tmux/plugins/tpm/tpm'
